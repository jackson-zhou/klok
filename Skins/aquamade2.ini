;all colors are in BGR format (hexadecimal or number)
[Settings]
CutColor=0x000000       ;cut window by this color (default red)
ShowAMPM=1              ;show AM/PM indicator (default 0)
AMPMColor=0x00000000	;color of AM/PM indicator
DateColor=0

HourColor=0x00000000    ;color of hour hand
HourLength=33           ;length of hour hand
HourLap=0               ;overlap of hour hand
HourWidth=3             ;width of hour hand

MinuteColor=0x00000000  ;color of minute hand
MinuteLength=51         ;length of minute hand
MinuteLap=0             ;overlap of minute hand
MinuteWidth=2           ;width of minute hand

SecondColor=0x000000FF  ;color of second hand
SecondLength=55         ;length of second hand
SecondLap=0             ;overlap of second hand
SecondWidth=1           ;width of second hand

CenterX=63             ;center point's X (default image_width / 2)
CenterY=61             ;center point's Y (default image_height / 2)
