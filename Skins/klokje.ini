;all colors are in BGR format (hexadecimal or number)
[Settings]
CutColor=0xff0000       ;cut window by this color (default red)
DisableAMPM=0           ;show AM/PM indicator (default 0)
AMPMColor=0x201010	;color of AM/PM indicator

HourPNG=klokjehour.hpng
HourPNGCenterDist=13

MinutePNG=klokjemin.hpng
MinutePNGCenterDist=22



SecondColor=0x000000   ;color of second hand
SecondLength=44        ;length of second hand
SecondLap=0            ;overlap of second hand
SecondWidth=0.6        ;width of second hand

CenterX=71           ;center point's X (default image_width / 2)
CenterY=79          ;center point's Y (default image_height / 2)

