;all colors are in BGR format (hexadecimal or number)
[Settings]
CutColor=0x00ff00       ;cut window by this color (default red)
DisableAMPM=0           ;show AM/PM indicator (default 0)
AMPMColor=0x201010	;color of AM/PM indicator

HourPNG=MMousehrHand.hpng
HourPNGCenterDist=15

MinutePNG=MMouseminHand.hpng
MinutePNGCenterDist=21



SecondColor=0x444444    ;color of second hand
SecondLength=52         ;length of second hand
SecondLap=0             ;overlap of second hand
SecondWidth=1           ;width of second hand


CenterX=62            ;center point's X (default image_width / 2)
CenterY=61            ;center point's Y (default image_height / 2)
