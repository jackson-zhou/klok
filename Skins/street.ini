;all colors are in BGR format (hexadecimal or number)
[Settings]
CutColor=0xffffff       ;cut window by this color (default red)
DisableAMPM=0           ;show AM/PM indicator (default 0)
AMPMColor=0x201010	;color of AM/PM indicator

HourPNG=streethour.hpng
HourPNGCenterDist=13

MinutePNG=streetmin.hpng
MinutePNGCenterDist=22



SecondColor=0xF7FA92   ;color of second hand
SecondLength=0          ;length of second hand
SecondLap=0            ;overlap of second hand
SecondWidth=0           ;width of second hand


CenterX=206            ;center point's X (default image_width / 2)
CenterY=104             ;center point's Y (default image_height / 2)
