;all colors are in BGR format (hexadecimal or number)
[Settings]
CutColor=0x0000FF       ;cut window by this color (default red)
			;not used with PNG in Win2k/XP

DisableAMPM=0           ;force AM/PM indicator disabled (default 0)
AMPMColor=0x404040	;color of AM/PM indicator
AMPMFont=Times New Roman
AMPMFontSize=9         ;size of AM/PM font

DisableDate=0
DateColor=0x787878
DateFont=Arial
DateFontSize=12

HourColor=0xAA9696      ;color of hour hand
HourLength=20           ;length of hour hand
HourLap=2               ;overlap of hour hand
HourWidth=4             ;width of hour hand

MinuteColor=0xAA9696    ;color of minute hand
MinuteLength=30         ;length of minute hand
MinuteLap=2             ;overlap of minute hand
MinuteWidth=3           ;width of minute hand

SecondColor=0x553FFF    ;color of second hand
SecondLength=32         ;length of second hand
SecondLap=2             ;overlap of second hand
SecondWidth=1           ;width of second hand

CenterX=76             ;center point's X (default image_width / 2)
CenterY=54             ;center point's Y (default image_height / 2)
